<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#100E1C"/>
      <stop offset="50%" stop-color="#0C0A14"/>
      <stop offset="100%" stop-color="#14112A"/>
    </linearGradient>

    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8C87A"/>
      <stop offset="40%" stop-color="#D4A054"/>
      <stop offset="100%" stop-color="#B8843C"/>
    </linearGradient>

    <linearGradient id="goldLight" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#F0D88E"/>
      <stop offset="100%" stop-color="#D4A054"/>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#D4A054" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#D4A054" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#D4A054" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="innerGlow" cx="50%" cy="35%" r="50%">
      <stop offset="0%" stop-color="rgba(240, 216, 142, 0.06)"/>
      <stop offset="100%" stop-color="rgba(240, 216, 142, 0)"/>
    </radialGradient>

    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="ambientGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>

    <clipPath id="roundClip">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#innerGlow)"/>

  <!-- Ambient glow -->
  <ellipse cx="256" cy="220" rx="140" ry="130" fill="url(#glow)" clip-path="url(#roundClip)"/>

  <!-- Sanctuary arch — main shape -->
  <g filter="url(#softGlow)">
    <!-- Outer arch -->
    <path d="
      M 176 360
      L 176 220
      C 176 148, 212 108, 256 108
      C 300 108, 336 148, 336 220
      L 336 360
    "
    stroke="url(#gold)" stroke-width="5" fill="none" stroke-linecap="round"/>

    <!-- Inner arch -->
    <path d="
      M 204 360
      L 204 230
      C 204 172, 228 142, 256 142
      C 284 142, 308 172, 308 230
      L 308 360
    "
    stroke="url(#gold)" stroke-width="3" fill="none" opacity="0.5" stroke-linecap="round"/>

    <!-- Keystone accent -->
    <circle cx="256" cy="108" r="6" fill="url(#goldLight)" opacity="0.9"/>
  </g>

  <!-- Central light beam -->
  <line x1="256" y1="160" x2="256" y2="340" stroke="url(#goldLight)" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>

  <!-- Horizontal threshold line -->
  <line x1="176" y1="300" x2="336" y2="300" stroke="url(#gold)" stroke-width="2" opacity="0.3" stroke-linecap="round"/>

  <!-- Inner sanctum dot — the warm center -->
  <circle cx="256" cy="230" r="16" fill="url(#gold)" opacity="0.15"/>
  <circle cx="256" cy="230" r="8" fill="url(#goldLight)" opacity="0.8"/>
  <circle cx="256" cy="230" r="4" fill="#F0E0C0" opacity="0.95"/>

  <!-- Radiating light lines from center -->
  <line x1="244" y1="222" x2="220" y2="200" stroke="#D4A054" stroke-width="1" opacity="0.15" stroke-linecap="round"/>
  <line x1="268" y1="222" x2="292" y2="200" stroke="#D4A054" stroke-width="1" opacity="0.15" stroke-linecap="round"/>
  <line x1="248" y1="238" x2="228" y2="264" stroke="#D4A054" stroke-width="1" opacity="0.1" stroke-linecap="round"/>
  <line x1="264" y1="238" x2="284" y2="264" stroke="#D4A054" stroke-width="1" opacity="0.1" stroke-linecap="round"/>

  <!-- Base platform -->
  <line x1="156" y1="360" x2="356" y2="360" stroke="url(#gold)" stroke-width="3" opacity="0.4" stroke-linecap="round"/>

  <!-- Subtle star accents -->
  <circle cx="370" cy="140" r="1.5" fill="#D4A054" opacity="0.35"/>
  <circle cx="148" cy="168" r="1" fill="#D4A054" opacity="0.25"/>
  <circle cx="384" cy="290" r="1" fill="#E8C87A" opacity="0.2"/>
  <circle cx="132" cy="310" r="1.5" fill="#D4A054" opacity="0.15"/>
</svg>
